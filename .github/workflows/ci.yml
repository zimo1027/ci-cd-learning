name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run tests
      run: |
        python -m unittest test_app.py
    
    - name: Code quality check with Flake8
      run: |
        flake8 . --count --show-source --statistics
    
    - name: Code quality check with Pylint
      run: |
        pylint app.py --exit-zero

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Configure SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/github_actions
        chmod 600 ~/.ssh/github_actions
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
    
    - name: Debug SSH configuration
      run: |
        echo "=== SSH Configuration Debug ==="
        echo "SSH_HOST: ${{ secrets.SSH_HOST }}"
        echo "SSH_USER: ${{ secrets.SSH_USER }}"
        echo "=== SSH Files ==="
        ls -la ~/.ssh/
        echo "=== Private Key First Line ==="
        head -1 ~/.ssh/github_actions
        echo "=== Private Key Last Line ==="
        tail -1 ~/.ssh/github_actions
        echo "=== Private Key Line Count ==="
        wc -l ~/.ssh/github_actions
    
    - name: Deploy to server
      run: |
        ssh -i ~/.ssh/github_actions ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          cd /home/zimo1027/projects/ci-cd-learning
          git pull origin main
          ./deploy.sh
        ENDSSH

